<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EcoFetal">
<title>Ecocardiografia Fetal — Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1628;
  --surface: #111f38;
  --surface2: #162642;
  --surface3: #1c2f50;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8edf5;
  --text2: #8fa3c4;
  --text3: #5a7099;
  --teal: #2dd4a0;
  --teal-dim: rgba(45,212,160,0.15);
  --teal-dark: rgba(45,212,160,0.08);
  --coral: #ff6b6b;
  --coral-dim: rgba(255,107,107,0.12);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --blue: #4da3ff;
  --blue-dim: rgba(77,163,255,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
}

/* HEADER */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
}
.app-header h1 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.app-header p {
  font-size: 12px;
  color: var(--text3);
  margin-top: 1px;
  font-family: 'DM Mono', monospace;
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surface3);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), #4da3ff);
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.progress-pct {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--teal);
  min-width: 36px;
  text-align: right;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.toolbar::-webkit-scrollbar { display: none; }
.tbtn {
  flex-shrink: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
}
.tbtn:active { transform: scale(0.96); opacity: 0.8; }
.tbtn svg { width: 13px; height: 13px; }

/* CONTENT */
.content { padding: 12px 16px; }

/* SECTIONS */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.section.done { border-color: rgba(45,212,160,0.25); }
.sec-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.15s;
}
.sec-header:active { background: var(--surface2); }
.sec-num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--teal-dim);
  border: 1px solid rgba(45,212,160,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--teal);
  flex-shrink: 0;
}
.sec-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.3; }
.sec-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: var(--surface3);
  color: var(--text3);
  padding: 3px 8px;
  border-radius: 99px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.sec-badge.complete { background: var(--teal-dim); color: var(--teal); }
.sec-chevron {
  width: 16px;
  height: 16px;
  color: var(--text3);
  transition: transform 0.25s;
  flex-shrink: 0;
}
.section.open .sec-chevron { transform: rotate(180deg); }
.sec-body { display: none; border-top: 1px solid var(--border); }
.section.open .sec-body { display: block; }

/* SUBSECTIONS */
.subsection { border-bottom: 1px solid var(--border); }
.subsection:last-child { border-bottom: none; }
.sub-header {
  display: flex;
  align-items: center;
  padding: 11px 16px 11px 24px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.15s;
}
.sub-header:active { background: var(--surface2); }
.sub-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  min-width: 30px;
  flex-shrink: 0;
}
.sub-title { font-size: 13px; font-weight: 500; color: var(--text2); flex: 1; line-height: 1.3; }
.sub-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: var(--surface3);
  color: var(--text3);
  padding: 2px 7px;
  border-radius: 99px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.sub-badge.complete { background: var(--teal-dim); color: var(--teal); }
.sub-chevron {
  width: 14px;
  height: 14px;
  color: var(--text3);
  transition: transform 0.25s;
  flex-shrink: 0;
}
.subsection.open .sub-chevron { transform: rotate(180deg); }
.sub-body { display: none; padding: 0 16px 14px 24px; }
.subsection.open .sub-body { display: block; }

/* LABELS */
.label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 6px;
  margin: 10px 0 6px;
}
.label-norm { background: var(--teal-dark); color: var(--teal); border: 1px solid rgba(45,212,160,0.15); }
.label-path { background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(255,107,107,0.15); }
.label-warn { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.15); }

/* ITEMS */
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: opacity 0.15s;
}
.item:active { opacity: 0.7; }
.checkbox {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border2);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}
.checkbox.checked { background: var(--teal); border-color: var(--teal); }
.checkbox svg { width: 11px; height: 11px; opacity: 0; transition: opacity 0.15s; }
.checkbox.checked svg { opacity: 1; }
.item-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  transition: all 0.2s;
}
.item-text.checked { text-decoration: line-through; color: var(--text3); }

/* PEARL */
.pearl {
  background: var(--teal-dark);
  border-left: 2px solid var(--teal);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 8px 12px;
  margin: 8px 0 6px;
  font-size: 12px;
  color: var(--teal);
  line-height: 1.5;
  font-style: italic;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10,22,40,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex;
  gap: 8px;
}
.nav-btn {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
}
.nav-btn:active { transform: scale(0.97); background: var(--surface3); }
.nav-btn svg { width: 15px; height: 15px; }
.nav-btn.danger { color: var(--coral); border-color: rgba(255,107,107,0.2); background: var(--coral-dim); }

/* SEARCH */
.search-wrap { padding: 0 16px 10px; }
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: rgba(45,212,160,0.4); }

.hidden { display: none !important; }
.highlight { background: rgba(45,212,160,0.2); border-radius: 3px; padding: 0 2px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>Ecocardiografia Fetal</h1>
  <p>Checklist de avaliação estruturada</p>
  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
    <span class="progress-pct" id="ppct">0%</span>
  </div>
</header>

<div class="toolbar">
  <button class="tbtn" onclick="expandAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5l6-3 6 3v6l-6 3-6-3V5z"/></svg>
    Expandir tudo
  </button>
  <button class="tbtn" onclick="collapseAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="12" height="4" rx="1"/></svg>
    Recolher tudo
  </button>
  <button class="tbtn" onclick="showOnlyIncomplete()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
    Pendentes
  </button>
  <button class="tbtn" onclick="toggleSearch()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
    Buscar
  </button>
</div>

<div class="search-wrap hidden" id="searchWrap">
  <input type="search" class="search-input" id="searchInput" placeholder="Buscar item..." oninput="doSearch(this.value)">
</div>

<div class="content" id="root"></div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="expandAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4-3 4 3m-8 4l4 3 4-3"/></svg>
    Expandir
  </button>
  <button class="nav-btn" onclick="collapseAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h8M4 8h8M4 11h8"/></svg>
    Recolher
  </button>
  <button class="nav-btn danger" onclick="confirmReset()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l10 10M13 3L3 13"/></svg>
    Limpar
  </button>
</nav>

<script>
const DATA = [
  {num:"1", title:"Posicionamento e situs",

     norm:["Registrar posição fetal (cefálica, pélvica ou transversa)","Definir direita e esquerda fetal antes de qualquer corte","Ápex cardíaco voltado para a esquerda fetal — levocardia","Estômago à esquerda fetal","Aorta descendente à esquerda da coluna","Veia cava inferior à direita da coluna","Situs solitus confirmado"],
     path:["Situs inversus total — todos os órgãos espelhados","Situs ambiguus / heterotaxia — posição indefinida","Dextrocardia — coração à direita sem inversão total","Mesocardia — ápex ao centro"]},
    {tag:"1.2", title:"Avaliação inicial do tórax",

     path:["Cardiomegalia — área cardíaca > 1/3 do tórax","Hipoplasia pulmonar — pulmões comprimidos (Ebstein grave, hérnia diafragmática)"]}

  {num:"2", title:"Corte de quatro câmaras (4C)",

    {tag:"2.1", title:"Anatomia e marcadores normais",

     path:["CIV de via de entrada — abaixo das válvulas AV, plano das válvulas nivelado","CIV muscular — ponta/trabéculas do septo","CIV perimembranosa — região membranosa (mais vulnerável)","DSAV parcial — abertura inferior do septo atrial + CIV entrada","DSAV total — abertura central, válvula única — associação com T21 em ~80%"]},

    {tag:"2.4", title:"Válvula mitral",

    {tag:"2.5", title:"Tamanho das câmaras ventriculares",

     warn:["Dilatação VD (VD/VE > 1,0): VPP > 34 sem = 21%; < 34 sem = 62%","Dilatação precoce (24–28 sem) tem maior significado clínico","Hipoplasia ventricular → avaliar obrigatoriamente as vias de saída"],

  {num:"3", title:"Doppler colorido — obrigatório",

   ]},

  {num:"5", title:"Corte 3VT — três vasos e traqueia",

     norm:["Ausência de protrusões da parede ventricular"],
     path:["Divertículo — colo estreito, contratilidade presente (fase inicial)","Aneurisma — colo largo, parede hipocinética (evolução do divertículo)","Complicações: arritmia, trombose, derrame pericárdico, hidropisia","Tratamento controverso: AAS discutido; nascimento em centro terciário"]}
   ]},

  {num:"7", title:"Hemodinâmica e arritmias",
   subs:[
    {tag:"7.1", title:"Repercussão hemodinâmica fetal",
     norm:["Ausência de hidropisia (sem ascite, derrame pleural, edema)","Movimentos fetais preservados","Frequência cardíaca regular (120–160 bpm)"],
     warn:["Na hidropisia: sempre avaliar estrutura + ritmo + função","15–25% das hidropísias não imunes têm causa cardíaca"],
     path:["Hidropisia fetal → buscar: disfunção ventricular, regurgitação valvar grave, arritmia","Causas extracardíacas: veia de Galeno, teratoma sacrococcígeo, corioangioma, STFF"]},
    {tag:"7.2", title:"Ritmo e frequência cardíaca",
     norm:["FC fetal: 120–160 bpm","Ritmo regular","Relação P:QRS 1:1 ao modo M"],
     path:["TSV — FC > 200 bpm, urgência fetal, pode causar hidropisia rapidamente","Bloqueio AV — Anti-Ro/Anti-La (lúpus); FC < 80 bpm; geralmente irreversível quando completo","Flutter atrial — FC atrial ~300 bpm; condução variável","Extrassístoles isoladas — geralmente benignas; monitorizar"]},
    {tag:"7.3", title:"Ducto venoso — onda A",
     norm:["Onda A positiva — fluxo anterógrado mesmo na sístole atrial","Índice de pulsatilidade normal para IG"],
     path:["Onda A reversa → aumento de pressão AD, alteração hemodinâmica D","Associada a: Ebstein, displasia tricúspide, obstrução grave VSVD","Em CIUR: onda A reversa = fase pré-terminal de deterioração fetal","No 1T: onda A reversa = indicação de ecocardiograma fetal precoce"]}
   ]},

  {num:"8", title:"Fisiologia e classificação",
   subs:[
    {tag:"8.1", title:"Shunts fetais — verificação funcional",
     norm:["Ducto venoso com onda A positiva","Forame oval com fluxo D→E fisiológico","Canal arterial com fluxo anterógrado"],
     path:["Canal arterial restritivo → insuficiência tricúspide, dilatação VD, EP funcional","Canal restritivo por AINEs (2T/3T) → monitorização seriada","Forame oval restritivo → dilatação AE","Ducto venoso ausente → VU drena direto no AD, dilatação global"]},
    {tag:"8.2", title:"Classificação — Diretriz Brasileira",
     norm:["Grupo 1 — sem repercussão, sem intervenção neonatal imediata (ex: CIV pequena)"],
     warn:["Grupo 2 — sem repercussão, mas evolutivas (ex: Tetralogia de Fallot, lesões obstrutivas)"],
     path:["Grupo 3 — intervenção neonatal imediata (ex: TGA, SCCEH)","Grupo 4 — com repercussão hemodinâmica fetal (ex: Ebstein grave)","Grupo 5 — complexas com elevada chance de deterioração fetal"]}
   ]}
];

const STORE_KEY = 'ecofetal_checks_v1';
let checked = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));
let allIds = [];
let filterIncomplete = false;
let searchActive = false;

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify([...checked]));
}

function idFor(si, subi, type, ii) { return `${si}_${subi}_${type}${ii}`; }

function buildDOM() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  allIds = [];

  DATA.forEach((sec, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = `sec_${si}`;

    let totalItems = 0;
    sec.subs.forEach(sub => {
      ['norm','warn','path'].forEach(t => { if(sub[t]) totalItems += sub[t].length; });
    });

    secEl.innerHTML = `
      <div class="sec-header" onclick="toggleSec(${si})">
        <div class="sec-num">${sec.num}</div>
        <div class="sec-title">${sec.title}</div>
        <div class="sec-badge" id="sbadge_${si}">0/${totalItems}</div>
        <svg class="sec-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <div class="sec-body" id="secbody_${si}"></div>`;
    root.appendChild(secEl);

    const secBody = document.getElementById(`secbody_${si}`);

    sec.subs.forEach((sub, subi) => {
      let subItems = 0;
      ['norm','warn','path'].forEach(t => { if(sub[t]) subItems += sub[t].length; });

      const subEl = document.createElement('div');
      subEl.className = 'subsection';
      subEl.id = `sub_${si}_${subi}`;
      subEl.innerHTML = `
        <div class="sub-header" onclick="toggleSub(${si},${subi})">
          <span class="sub-tag">${sub.tag}</span>
          <span class="sub-title">${sub.title}</span>
          <span class="sub-badge" id="subbadge_${si}_${subi}">0/${subItems}</span>
          <svg class="sub-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
        </div>
        <div class="sub-body" id="subbody_${si}_${subi}"></div>`;
      secBody.appendChild(subEl);

      const subBody = document.getElementById(`subbody_${si}_${subi}`);
      let bodyHTML = '';

      if (sub.norm && sub.norm.length) {
        bodyHTML += `<div class="label label-norm"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l4 4 6-6"/></svg>Normal</div>`;
        sub.norm.forEach((it, ii) => {
          const id = idFor(si, subi, 'n', ii);
          allIds.push(id);
          bodyHTML += itemHTML(id, it);
        });
      }
      if (sub.pearl) {
        bodyHTML += `<div class="pearl">${sub.pearl}</div>`;
      }
      if (sub.warn && sub.warn.length) {
        bodyHTML += `<div class="label label-warn"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6v4M8 12h.01"/></svg>Atenção</div>`;
        sub.warn.forEach((it, ii) => {
          const id = idFor(si, subi, 'w', ii);
          allIds.push(id);
          bodyHTML += itemHTML(id, it);
        });
      }
      if (sub.path && sub.path.length) {
        bodyHTML += `<div class="label label-path"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>Alterado</div>`;
        sub.path.forEach((it, ii) => {
          const id = idFor(si, subi, 'p', ii);
          allIds.push(id);
          bodyHTML += itemHTML(id, it);
        });
      }
      subBody.innerHTML = bodyHTML;
    });
  });

  allIds.forEach(id => {
    if (checked.has(id)) applyCheck(id, true, false);
  });
  updateAllBadges();
  updateProgress();
}

function itemHTML(id, text) {
  return `<div class="item" id="item_${id}" onclick="toggleItem('${id}')">
    <div class="checkbox" id="cb_${id}"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M1.5 6l3 3 6-6"/></svg></div>
    <span class="item-text" id="tx_${id}">${text}</span>
  </div>`;
}

function applyCheck(id, state, doSave) {
  const cb = document.getElementById('cb_' + id);
  const tx = document.getElementById('tx_' + id);
  if (!cb) return;
  if (state) { cb.classList.add('checked'); tx.classList.add('checked'); checked.add(id); }
  else { cb.classList.remove('checked'); tx.classList.remove('checked'); checked.delete(id); }
  if (doSave) save();
}

function toggleItem(id) {
  applyCheck(id, !checked.has(id), true);
  updateAllBadges();
  updateProgress();
}

function updateProgress() {
  const total = allIds.length;
  const done = [...checked].filter(id => allIds.includes(id)).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ppct').textContent = pct + '%';
}

function updateAllBadges() {
  DATA.forEach((sec, si) => {
    let secDone = 0, secTotal = 0;
    sec.subs.forEach((sub, subi) => {
      let subDone = 0, subTotal = 0;
      ['norm','warn','path'].forEach(t => {
        if (!sub[t]) return;
        sub[t].forEach((_, ii) => {
          const id = idFor(si, subi, t[0], ii);
          subTotal++;
          if (checked.has(id)) subDone++;
        });
      });
      const sb = document.getElementById(`subbadge_${si}_${subi}`);
      if (sb) { sb.textContent = `${subDone}/${subTotal}`; sb.className = 'sub-badge' + (subDone === subTotal && subTotal > 0 ? ' complete' : ''); }
      secDone += subDone; secTotal += subTotal;
    });
    const b = document.getElementById(`sbadge_${si}`);
    if (b) { b.textContent = `${secDone}/${secTotal}`; b.className = 'sec-badge' + (secDone === secTotal && secTotal > 0 ? ' complete' : ''); }
    const s = document.getElementById(`sec_${si}`);
    if (s) { s.classList.toggle('done', secDone === secTotal && secTotal > 0); }
  });
}

function toggleSec(si) { document.getElementById(`sec_${si}`).classList.toggle('open'); }
function toggleSub(si, subi) { document.getElementById(`sub_${si}_${subi}`).classList.toggle('open'); }

function expandAll() {
  document.querySelectorAll('.section').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.subsection').forEach(el => el.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.subsection').forEach(el => el.classList.remove('open'));
}

function showOnlyIncomplete() {
  filterIncomplete = !filterIncomplete;
  allIds.forEach(id => {
    const item = document.getElementById('item_' + id);
    if (item) item.classList.toggle('hidden', filterIncomplete && checked.has(id));
  });
}

function toggleSearch() {
  searchActive = !searchActive;
  const wrap = document.getElementById('searchWrap');
  wrap.classList.toggle('hidden', !searchActive);
  if (searchActive) { document.getElementById('searchInput').focus(); }
  else { doSearch(''); document.getElementById('searchInput').value = ''; }
}

function doSearch(q) {
  const term = q.toLowerCase().trim();
  allIds.forEach(id => {
    const item = document.getElementById('item_' + id);
    const tx = document.getElementById('tx_' + id);
    if (!item || !tx) return;
    if (!term) {
      item.classList.remove('hidden');
      tx.innerHTML = tx.textContent;
      return;
    }
    const text = tx.textContent;
    const lower = text.toLowerCase();
    const idx = lower.indexOf(term);
    if (idx === -1) {
      item.classList.add('hidden');
    } else {
      item.classList.remove('hidden');
      tx.innerHTML = text.slice(0, idx) + `<mark class="highlight">${text.slice(idx, idx + term.length)}</mark>` + text.slice(idx + term.length);
      const secIdx = id.split('_')[0];
      const subIdx = id.split('_')[1];
      document.getElementById(`sec_${secIdx}`).classList.add('open');
      document.getElementById(`sub_${secIdx}_${subIdx}`).classList.add('open');
    }
  });
}

function confirmReset() {
  if (confirm('Limpar todos os itens marcados?')) {
    checked.clear();
    allIds.forEach(id => applyCheck(id, false, false));
    save();
    updateAllBadges();
    updateProgress();
  }
}

buildDOM();
</script>
</body>
</html>
